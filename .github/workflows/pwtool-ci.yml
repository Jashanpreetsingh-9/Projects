name: pwtool On-Push Automated Testing


on:
  push:
    branches:
      - "**"
    paths:
      - "./Password Generator/pwtool/**"
      - "./Password Generator/requirements.txt"
      - "./.github/workflows/**"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    permissions:
      contents: read

    defaults:
      run:
        working-directory: "Password Generator"

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        working-directory: "Password Generator"
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: "Password Generator"
        run: pytest

  create-pull-request:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() && github.ref_name != 'main' }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Create PR if one doesn't exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          if gh pr list --head "$BRANCH" --json number --jq 'length == 0' | grep -q true; then
            gh pr create -B main -H "$BRANCH" \
              --title "Merge $BRANCH into main" \
              --body "Automated PR via GitHub Actions"
          else
            echo "PR already exists for $BRANCH"
          fi
