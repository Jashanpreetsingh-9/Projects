name: PWTool On-Push Automated Testing

on:
  push:
    branches:
      - "**"
    paths:
      - "Password Generator/**"
      - ".github/workflows/**"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Debug step (safe to keep)
      - name: Verify project structure
        run: |
          pwd
          ls -la
          ls -la "Password Generator"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: "Password Generator"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: "Password Generator"
        run: |
          python -m pytest

  create-pull-request:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() && github.ref_name != 'main' }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Create PR if one doesn't exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          if gh pr list --head "$BRANCH" --json number --jq 'length == 0' | grep -q true; then
            gh pr create -B main -H "$BRANCH" \
              --title "Merge $BRANCH into main" \
              --body "Automated PR via GitHub Actions"
          else
            echo "PR already exists for $BRANCH"
          fi